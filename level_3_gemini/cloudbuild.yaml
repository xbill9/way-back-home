steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest', '.']
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--labels'
      - 'dev-tutorial=multi-modal'
      - '--set-env-vars'
      - 'GOOGLE_GENAI_USE_VERTEXAI=False,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=${_REGION},GOOGLE_API_KEY=${_GOOGLE_API_KEY},GEMINI_API_KEY=${_GOOGLE_API_KEY},GEMINI_KEY=${_GOOGLE_API_KEY},MODEL_ID=gemini-3.1-flash-live-preview'

# Automatically push the image built in the first step
images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'

timeout: 800s

substitutions:
  _SERVICE_NAME: biometric-scout
  _REGION: us-central1
  _GOOGLE_API_KEY: "" # Provide via gcloud builds submit --substitutions=_GOOGLE_API_KEY=YOUR_KEY
